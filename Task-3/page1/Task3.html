<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="task3.css">
    <title>Task 3</title>
</head>

<body>
    <div class="card">
        <div class="card-title">
            Sign Up
        </div>
        <div class="card-description">
            Please fill in this form to crreate an account!
        </div>
        <hr>
        <div class="input-fullname">
            <input class="card-input" type="text" placeholder="First name">
            <input class="card-input" type="text" placeholder="Last Name">
        </div>
        <input class="card-input" type="email" placeholder="Email">
        <input class="card-input" type="password" placeholder="Password">
        <input class="card-input" type="password" placeholder="Confirm Password">
        <div>
            <input type="checkbox">
            <label>I accept the <span class="text-content">Terms of Use & Privacy Policy</span></label>
        </div>
        <button class="card-button" >Sign Up</button>
    </div>
    <div style="color: white;">Aready have an account? <a>Login here</a></div>
</body>

</html>
